poll_interval: 15s

devices:
  - name: sma
    protocol: modbus-tcp
    address: 192.168.50.212
    port: 502
    timeout: 2s
    labels:
      site: "garage"
      role: "main"

    slaves:
      - name: sunnyboy4
        slave_id: 3
        offset: 0
        labels:
          power: 4000
          strings: 2
        modbus_registers:
          - register: 30977
            function_code: 4
            name: output_current
            description: ""
            words: 2
            datatype: S32
            unit: A
            gain: 0.001
            ignore_negative: false
            flags: 

          - register: 30783
            function_code: 4
            name: output_voltage
            description: ""
            words: 2
            datatype: S32
            unit: V
            gain: 0.01
            ignore_negative: false
            flags: 

          - register: 30777
            function_code: 4
            name: output_power_watt
            description: ""
            words: 2
            datatype: S32
            unit: W
            gain: 1
            ignore_negative: false
            flags: 

          - register: 30815
            function_code: 4
            name: output_power_va
            description: ""
            words: 2
            datatype: S32
            unit: VA
            gain: 1
            ignore_negative: false
            flags: 

          - register: 30803
            function_code: 4
            name: output_frequency
            description: ""
            words: 2
            datatype: S32
            unit: Hz
            gain: 0.01
            ignore_negative: false
            flags: 

          - register: 30769
            function_code: 4
            name: input_current_1
            description: "aaaa"
            words: 2
            datatype: S32
            unit: A
            gain: 0.001
            ignore_negative: true
            flags: 
          - register: 30957
            function_code: 4
            name: input_current_1
            description: "aaaaa"
            words: 2
